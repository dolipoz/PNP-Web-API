name: 'Crear S3'
on:
  workflow_dispatch:

jobs:
  terraform:
    name: 'Crear S3'
    runs-on: ubuntu-latest

    steps:
    # ------------------------------- Importar python para instalar awscli -------------------------------
    - name: Importar Extensiones de Python para awscli y las credenciales de AWS
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
    # Instalar awscli para subir ficheros al S3
    - run: |
        python -m pip install --upgrade pip
        pip install awscli
    # Cargamos las credenciales de AWS para usar awscli y terraform
    - uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Crear S3 mediante awscli
      run: aws s3api create-bucket --bucket ${{ secrets.AWS_S3 }} --region ${{ secrets.AWS_REGION }}

