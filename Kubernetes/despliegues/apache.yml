apiVersion: apps/v1
kind: Deployment
metadata:
  name: despliegue-apache
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pod-apache
  template:
    metadata:
      labels:
        app: pod-apache
    spec:
      containers:
        - name: contenedor-apache
          image: $ImagenApache
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
            - containerPort: 443
