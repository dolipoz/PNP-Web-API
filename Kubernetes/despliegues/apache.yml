apiVersion: apps/v1
kind: Deployment
metadata:
  name: despliegue-apache
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pod-apache
  template:
    metadata:
      labels:
        app: pod-apache
    spec:
      containers:
        - name: contenedor-apache
          image: $ImagenApache
          imagePullPolicy: IfNotPresent
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql
                  key: MYSQL_PASS
          ports:
            - name: http
              containerPort: 80
            - name: https
              containerPort: 443
          volumeMounts:
            - name: volumen-html
              mountPath: /var/www/html
      volumes:
        - name: volumen-html
          persistentVolumeClaim:
            claimName: pvc-efs-html